<!DOCTYPE html>
<html>
<head>
    <title>Simple Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Test Page</h1>
    <div id="output">Loading...</div>
    <script>
        console.log('Starting...');
        
        function getProductId() {
            return new URLSearchParams(location.search).get('id');
        }
        
        async function loadProduct() {
            console.log('loadProduct called, pid:', getProductId());
            try {
                console.log('Fetching products.json...');
                var response = await fetch('products.json?v=' + Date.now());
                console.log('Response:', response.status);
                var products = await response.json();
                console.log('Products:', products.length);
                
                var pid = getProductId();
                var product = products.find(function(p) { return p.id == pid; });
                console.log('Product found:', product ? product.name : 'NOT FOUND');
                
                document.getElementById('output').textContent = 'Products: ' + products.length + ', Product: ' + (product ? product.name : 'Not found');
            } catch(e) {
                console.error('Error:', e);
                document.getElementById('output').textContent = 'Error: ' + e.message;
            }
        }
        
        loadProduct();
    </script>
</body>
</html>
